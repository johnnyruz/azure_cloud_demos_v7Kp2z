<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 730" width="980" height="730" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078D4"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#773ADC"/>
    </marker>
    <marker id="arrow-cosmos" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003087"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="980" height="730" fill="#F0F2F5"/>

  <!-- ══════════════════════════════════════════════════════
       CLIENT
  ══════════════════════════════════════════════════════ -->
  <rect x="390" y="10" width="200" height="58" rx="8" fill="white" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="10" width="200" height="6" rx="4" fill="#888"/>
  <!-- monitor icon (simple) -->
  <rect x="404" y="26" width="22" height="16" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <line x1="415" y1="42" x2="415" y2="47" stroke="#555" stroke-width="1.5"/>
  <line x1="410" y1="47" x2="420" y2="47" stroke="#555" stroke-width="1.5"/>
  <text x="435" y="35" font-size="12" font-weight="700" fill="#333">Client / Browser</text>
  <text x="435" y="52" font-size="10" fill="#888">HTTPS Request</text>

  <!-- Arrow: Client → Web App -->
  <line x1="490" y1="68" x2="490" y2="248" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <rect x="498" y="145" width="52" height="18" rx="3" fill="#F0F2F5"/>
  <text x="524" y="158" font-size="10" fill="#555" text-anchor="middle">HTTPS</text>

  <!-- ══════════════════════════════════════════════════════
       RESOURCE GROUP
  ══════════════════════════════════════════════════════ -->
  <rect x="15" y="90" width="950" height="600" rx="12" fill="white" fill-opacity="0.6" stroke="#0078D4" stroke-width="2" stroke-dasharray="10,5"/>
  <rect x="15" y="90" width="360" height="26" rx="6" fill="#0078D4"/>
  <!-- resource group icon -->
  <rect x="22" y="96" width="14" height="14" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="25" y="99" width="8" height="8" rx="1" fill="white"/>
  <text x="42" y="108" font-size="12" fill="white" font-weight="700">Resource Group: rg-session2-app-data</text>
  <text x="385" y="108" font-size="11" fill="#90C8F0">East US</text>

  <!-- ══════════════════════════════════════════════════════
       COMPUTE SECTION
  ══════════════════════════════════════════════════════ -->
  <rect x="28" y="122" width="450" height="305" rx="8" fill="#EBF3FC" stroke="#0078D4" stroke-width="1"/>
  <!-- compute icon -->
  <rect x="37" y="130" width="12" height="9" rx="1" fill="none" stroke="#0078D4" stroke-width="1.5"/>
  <rect x="39" y="132" width="8" height="5" rx="0.5" fill="#0078D4"/>
  <text x="54" y="140" font-size="12" font-weight="700" fill="#0078D4">Compute</text>

  <!-- App Service Plan -->
  <rect x="44" y="150" width="418" height="82" rx="6" fill="white" stroke="#0078D4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44" y="150" width="7" height="82" rx="3" fill="#0078D4"/>
  <!-- ASP icon (gear) -->
  <circle cx="65" cy="183" r="10" fill="none" stroke="#0078D4" stroke-width="1.5"/>
  <circle cx="65" cy="183" r="4" fill="#0078D4"/>
  <text x="82" y="169" font-size="13" font-weight="700" fill="#0078D4">App Service Plan</text>
  <text x="82" y="186" font-size="11" fill="#555">asp-session2appdata-{suffix}</text>
  <text x="82" y="201" font-size="11" fill="#555">OS: Linux  ·  SKU: F1 (Free Tier)</text>
  <text x="82" y="218" font-size="10" fill="#888">Hosts the API application</text>

  <!-- Arrow: ASP → Web App -->
  <line x1="253" y1="232" x2="253" y2="252" stroke="#0078D4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Web App -->
  <rect x="44" y="252" width="418" height="158" rx="6" fill="white" stroke="#0078D4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44" y="252" width="7" height="158" rx="3" fill="#0078D4"/>
  <!-- app service icon (diamond) -->
  <polygon points="65,270 72,280 65,290 58,280" fill="none" stroke="#0078D4" stroke-width="1.5"/>
  <polygon points="65,274 69,280 65,286 61,280" fill="#0078D4"/>
  <text x="82" y="272" font-size="13" font-weight="700" fill="#0078D4">Linux Web App (API)</text>
  <text x="82" y="290" font-size="11" fill="#555">session2appdata-api-{suffix}</text>
  <text x="82" y="308" font-size="11" fill="#555">Runtime: .NET 10.0  ·  HTTPS Only</text>
  <text x="82" y="325" font-size="11" fill="#555">Swagger UI enabled at /swagger</text>
  <line x1="82" y1="334" x2="454" y2="334" stroke="#eee" stroke-width="1"/>
  <text x="82" y="348" font-size="10" fill="#888" font-weight="600">App Settings:</text>
  <text x="82" y="363" font-size="10" fill="#888">  CosmosDb__ConnectionString / DatabaseName / ContainerName</text>
  <text x="82" y="378" font-size="10" fill="#888">  APPLICATIONINSIGHTS_CONNECTION_STRING</text>
  <text x="82" y="393" font-size="10" fill="#888">  EnableSwagger=true</text>

  <!-- ══════════════════════════════════════════════════════
       DATA SECTION
  ══════════════════════════════════════════════════════ -->
  <rect x="498" y="122" width="455" height="305" rx="8" fill="#E6F4F0" stroke="#00B294" stroke-width="1"/>
  <!-- database icon -->
  <ellipse cx="511" cy="133" rx="7" ry="4" fill="none" stroke="#00B294" stroke-width="1.5"/>
  <line x1="504" y1="133" x2="504" y2="141" stroke="#00B294" stroke-width="1.5"/>
  <line x1="518" y1="133" x2="518" y2="141" stroke="#00B294" stroke-width="1.5"/>
  <ellipse cx="511" cy="141" rx="7" ry="4" fill="none" stroke="#00B294" stroke-width="1.5"/>
  <text x="525" y="140" font-size="12" font-weight="700" fill="#00875A">Data</text>

  <!-- Cosmos DB Account -->
  <rect x="514" y="150" width="423" height="85" rx="6" fill="white" stroke="#003087" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="514" y="150" width="7" height="85" rx="3" fill="#003087"/>
  <!-- cosmos icon (circle orbit) -->
  <circle cx="535" cy="185" r="10" fill="none" stroke="#003087" stroke-width="1.5"/>
  <circle cx="535" cy="185" r="3" fill="#003087"/>
  <ellipse cx="535" cy="185" rx="14" ry="6" fill="none" stroke="#003087" stroke-width="1" transform="rotate(-35,535,185)"/>
  <text x="552" y="170" font-size="13" font-weight="700" fill="#003087">Azure Cosmos DB Account</text>
  <text x="552" y="188" font-size="11" fill="#555">session2appdatacosmos{suffix}</text>
  <text x="552" y="205" font-size="11" fill="#555">Kind: GlobalDocumentDB  ·  Capacity: Serverless</text>
  <text x="552" y="221" font-size="10" fill="#888">Consistency: Session  ·  Geo: East US (priority 0)</text>

  <!-- Arrow: Cosmos → SQL DB -->
  <line x1="725" y1="235" x2="725" y2="254" stroke="#003087" stroke-width="1.5" marker-end="url(#arrow-cosmos)"/>

  <!-- SQL Database -->
  <rect x="514" y="254" width="423" height="72" rx="6" fill="white" stroke="#003087" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="514" y="254" width="7" height="72" rx="3" fill="#0072C6"/>
  <!-- db icon (cylinder) -->
  <ellipse cx="535" cy="268" rx="9" ry="5" fill="none" stroke="#0072C6" stroke-width="1.5"/>
  <line x1="526" y1="268" x2="526" y2="310" stroke="#0072C6" stroke-width="1.5"/>
  <line x1="544" y1="268" x2="544" y2="310" stroke="#0072C6" stroke-width="1.5"/>
  <ellipse cx="535" cy="310" rx="9" ry="5" fill="none" stroke="#0072C6" stroke-width="1.5"/>
  <text x="552" y="275" font-size="13" font-weight="700" fill="#003087">SQL Database</text>
  <text x="552" y="293" font-size="11" fill="#555">Name: trainingdb</text>
  <text x="552" y="311" font-size="10" fill="#888">Serverless throughput (inherited from account)</text>

  <!-- Arrow: SQL DB → Container -->
  <line x1="725" y1="326" x2="725" y2="346" stroke="#003087" stroke-width="1.5" marker-end="url(#arrow-cosmos)"/>

  <!-- Container -->
  <rect x="514" y="346" width="423" height="68" rx="6" fill="white" stroke="#003087" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="514" y="346" width="7" height="68" rx="3" fill="#0072C6"/>
  <!-- container icon (grid) -->
  <rect x="528" y="360" width="14" height="14" rx="1" fill="none" stroke="#0072C6" stroke-width="1.5"/>
  <line x1="535" y1="360" x2="535" y2="374" stroke="#0072C6" stroke-width="1"/>
  <line x1="528" y1="367" x2="542" y2="367" stroke="#0072C6" stroke-width="1"/>
  <text x="552" y="365" font-size="13" font-weight="700" fill="#003087">SQL Container</text>
  <text x="552" y="382" font-size="11" fill="#555">Name: items  ·  Partition Key: /category</text>
  <text x="552" y="399" font-size="10" fill="#888">Stores JSON documents (products, transactions, etc.)</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW: Web App → Cosmos DB
  ══════════════════════════════════════════════════════ -->
  <path d="M 462 325 L 490 325 L 490 192 L 514 192" stroke="#0078D4" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <rect x="457" y="252" width="90" height="16" rx="3" fill="#EBF3FC"/>
  <text x="502" y="264" font-size="9" fill="#0078D4" text-anchor="middle">Connection String</text>

  <!-- ══════════════════════════════════════════════════════
       OBSERVABILITY SECTION
  ══════════════════════════════════════════════════════ -->
  <rect x="28" y="448" width="925" height="210" rx="8" fill="#F0EBF8" stroke="#773ADC" stroke-width="1"/>
  <!-- eye icon -->
  <ellipse cx="40" cy="459" rx="8" ry="5" fill="none" stroke="#773ADC" stroke-width="1.5"/>
  <circle cx="40" cy="459" r="2.5" fill="#773ADC"/>
  <text x="54" y="463" font-size="12" font-weight="700" fill="#773ADC">Observability</text>

  <!-- Log Analytics Workspace -->
  <rect x="44" y="474" width="420" height="115" rx="6" fill="white" stroke="#0078D4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="44" y="474" width="7" height="115" rx="3" fill="#0078D4"/>
  <!-- chart icon -->
  <rect x="58" y="488" width="18" height="18" rx="2" fill="none" stroke="#0078D4" stroke-width="1.5"/>
  <line x1="62" y1="500" x2="62" y2="504" stroke="#0078D4" stroke-width="1.5"/>
  <line x1="67" y1="496" x2="67" y2="504" stroke="#0078D4" stroke-width="1.5"/>
  <line x1="72" y1="492" x2="72" y2="504" stroke="#0078D4" stroke-width="1.5"/>
  <text x="82" y="496" font-size="13" font-weight="700" fill="#0078D4">Log Analytics Workspace</text>
  <text x="82" y="514" font-size="11" fill="#555">log-session2appdata-{suffix}</text>
  <text x="82" y="531" font-size="11" fill="#555">SKU: PerGB2018  ·  Retention: 30 days</text>
  <text x="82" y="548" font-size="10" fill="#888">Central log store — receives telemetry from App Insights</text>
  <text x="82" y="563" font-size="10" fill="#888">Enables KQL queries, dashboards, and alerts</text>
  <text x="82" y="578" font-size="10" fill="#888">Workspace-based architecture</text>

  <!-- Arrow: Log Analytics → App Insights -->
  <line x1="464" y1="531" x2="507" y2="531" stroke="#773ADC" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <rect x="459" y="518" width="55" height="16" rx="3" fill="#F0EBF8"/>
  <text x="486" y="530" font-size="9" fill="#773ADC" text-anchor="middle">workspace_id</text>

  <!-- Application Insights -->
  <rect x="508" y="474" width="420" height="115" rx="6" fill="white" stroke="#773ADC" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="508" y="474" width="7" height="115" rx="3" fill="#773ADC"/>
  <!-- lightbulb icon (simple) -->
  <circle cx="529" cy="497" r="8" fill="none" stroke="#773ADC" stroke-width="1.5"/>
  <line x1="525" y1="506" x2="533" y2="506" stroke="#773ADC" stroke-width="1.5"/>
  <line x1="527" y1="509" x2="531" y2="509" stroke="#773ADC" stroke-width="1"/>
  <text x="546" y="496" font-size="13" font-weight="700" fill="#773ADC">Application Insights</text>
  <text x="546" y="514" font-size="11" fill="#555">appi-session2appdata-{suffix}</text>
  <text x="546" y="531" font-size="11" fill="#555">Application Type: web</text>
  <text x="546" y="548" font-size="10" fill="#888">Collects: requests, dependencies, exceptions, traces</text>
  <text x="546" y="563" font-size="10" fill="#888">Agent: ApplicationInsightsAgent v3</text>
  <text x="546" y="578" font-size="10" fill="#888">Workspace-based (stores logs in Log Analytics)</text>

  <!-- Arrow: Web App → App Insights -->
  <path d="M 253 410 L 253 440 L 718 440 L 718 474" stroke="#773ADC" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <rect x="440" y="432" width="100" height="16" rx="3" fill="#F0EBF8"/>
  <text x="490" y="444" font-size="9" fill="#773ADC" text-anchor="middle">Connection String</text>

  <!-- ══════════════════════════════════════════════════════
       TAGS FOOTER
  ══════════════════════════════════════════════════════ -->
  <rect x="28" y="674" width="925" height="28" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="40" y="692" font-size="10" fill="#888">
    <tspan font-weight="600">Tags: </tspan>
    environment = dev   ·   workshop = cloud-journey-session-2   ·   managed_by = terraform
  </text>

  <!-- ══════════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════════ -->
  <text x="490" y="718" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Session 2: App Data — Azure Infrastructure Architecture</text>
  <text x="490" y="728" text-anchor="middle" font-size="0" fill="none">end</text>

</svg>
